spring.application.name=invoice-service
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/invoice_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=solarpigeon9277

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.doc-expansion=none

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,metrics,loggers,threaddump,heapdump
management.endpoint.health.show-details=always